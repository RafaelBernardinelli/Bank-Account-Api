apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bank-account-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bank-account-api

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 10
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 10
      policies:
        - type: Percent
          value: 50
          periodSeconds: 10
      selectPolicy: Max