apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-account-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-account-api
  template:
    metadata:
      labels:
        app: bank-account-api
    spec:
      containers:
        - name: api
          image: bank-account-api:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/bank
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
