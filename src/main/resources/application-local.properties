spring.application.name=bank-account-api

spring.output.ansi.enabled=ALWAYS
logging.level.org.hibernate.orm.connections.pooling=WARN

spring.datasource.url=jdbc:postgresql://localhost:5432/bank_account
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.enabled=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

bank.operation.mode=${BANK_OPERATION_MODE:kafka}

# ==========================
# Kafka
# ==========================

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
#spring.kafka.bootstrap-servers=localhost:29092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=bank-account-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.max.block.ms=30000

# Permite desserializar seus eventos
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Topics
auto.create.topics.enable=true

bank.kafka.topic.deposit=bank.deposit.requested
bank.kafka.topic.withdraw=bank.withdraw.requested
bank.kafka.topic.transfer=bank.transfer.requested