spring.application.name=bank-account-api
spring.profiles.active=local

# ==========================================
# Logging
# ==========================================
spring.output.ansi.enabled=ALWAYS
logging.level.org.hibernate.orm.connections.pooling=WARN

# ==========================================
# Database
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/bank_account
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ==========================================
# Flyway
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# Security
# ==========================================
app.security.enabled=false

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Kafka - Producer
# ==========================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ==========================================
# Kafka - Consumer
# ==========================================
spring.kafka.consumer.group-id=bank-account-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ==========================================
# Kafka - Topics
# ==========================================
bank.kafka.topic.deposit=bank.deposit.requested
bank.kafka.topic.withdraw=bank.withdraw.requested
bank.kafka.topic.transfer=bank.transfer.requested

# ==========================================
# Application
# ==========================================
bank.operation.mode=${BANK_OPERATION_MODE:async}

# ==========================================
# Kafka Broker
# (sobrescrito pelos profiles)
# ==========================================
spring.kafka.bootstrap-servers=localhost:29092